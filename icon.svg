<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bsGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2e3f"/>
      <stop offset="100%" stop-color="#ff8a1f"/>
    </linearGradient>
    <linearGradient id="bsShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- App background (matches the dark theme) -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0d0d11"/>
  <!-- 3D glass corner shine -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bsShine)"/>
  <!-- Brand mark -->
  <text
    x="50%"
    y="58%"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="240"
    font-weight="800"
    letter-spacing="-8"
    fill="url(#bsGradient)"
  >BS</text>
</svg>
