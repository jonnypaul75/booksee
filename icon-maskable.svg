<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bsGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2e3f"/>
      <stop offset="100%" stop-color="#ff8a1f"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background — Android adaptive icon will mask it -->
  <rect width="512" height="512" fill="#0d0d11"/>
  <!-- Mark sized to fit inside the 80% safe zone (centered) -->
  <text
    x="50%"
    y="58%"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="180"
    font-weight="800"
    letter-spacing="-6"
    fill="url(#bsGradient)"
  >BS</text>
</svg>
